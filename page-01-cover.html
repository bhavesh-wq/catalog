<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EZ-FLO Product Catalog - Cover</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .cover-wrap {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .cover-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }
  </style>
</head>
<body>

<div class="page">
  <div class="cover-wrap" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; overflow: hidden;">
    <img src="../mockup/Photoroom (14)/front.png" alt="EZ-FLO Product Catalog Cover" style="width: 100%; height: 100%; object-fit: cover; object-position: center center;">
  </div>
</div>

</body>
</html>
